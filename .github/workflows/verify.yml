name: verify

# 在真实的云端 macOS / Linux 上验证 Unix 版脚本。
# 作者本地是 Windows，无 Mac/Linux 设备，靠这条流水线做真机回归。

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: 语法检查
        run: |
          bash -n vpn-leak-audit.sh
          bash -n browse-vpn.sh
          bash -n verify-unix.sh

      - name: ShellCheck 静态分析
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -S warning vpn-leak-audit.sh browse-vpn.sh verify-unix.sh
          else
            echo "shellcheck 不可用，跳过（非本平台预装）"
          fi

      - name: 安装 Chrome (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask google-chrome

      - name: 定位 Chrome (Linux)
        if: runner.os == 'Linux'
        run: which google-chrome google-chrome-stable chromium chromium-browser || true

      - name: 泄露自查（只读；DNS 主动实测另测，此处跳过保持确定性）
        run: bash ./vpn-leak-audit.sh --no-dns-leak | tee audit.out

      - name: 断言 DNS 一节无非法 token（回归 resolvectl 链路编号 bug）
        shell: bash
        run: |
          bad=$(grep -oE 'DNS: [^ ]+' audit.out | awk '{print $2}' \
                | grep -vE '^([0-9]{1,3}\.){3}[0-9]{1,3}$' || true)
          if [ -n "$bad" ]; then
            echo "发现非 IPv4 的 DNS token（解析有杂质）："; echo "$bad"; exit 1
          fi
          echo "DNS token 全部合法（或本机无 DNS 输出）"

      - name: DNS 泄露主动实测冒烟（bash.ws，最佳努力）
        shell: bash
        run: |
          # 跑带 DNS 主动实测的完整自查，只断言该代码路径产出了可识别结果
          # （列出解析器 / 判定未泄露 / 或 bash.ws 不可达时优雅跳过），不因外部服务波动而挂 CI。
          out=$(bash ./vpn-leak-audit.sh 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g')
          printf '%s\n' "$out" | grep -E '主动实测|解析器|未泄露|不可达|未取到|未观察到' || true
          if printf '%s' "$out" | grep -qE '解析器 |DNS 未泄露|bash\.ws 不可达|未取到 bash\.ws|未观察到实际解析器'; then
            echo "✅ PASS：$(uname) 上 DNS 主动实测代码路径正常（判定或优雅跳过均可）"
          else
            echo "❌ FAIL：DNS 主动实测未产出任何结构化结果"; exit 1
          fi

      - name: browse-vpn 决策（--dry-run，强制 US 保证确定性）
        shell: bash
        run: |
          out=$(bash ./browse-vpn.sh US --dry-run)
          echo "$out"
          echo "$out" | grep -q '将使用' || { echo "未产出时区/语言决策"; exit 1; }

      - name: verify-unix.sh 汇总（信息性）
        run: bash ./verify-unix.sh

      - name: 核心卖点验证 —— 真 Chrome 是否遵从 TZ 环境变量
        shell: bash
        run: |
          set -e
          CHROME=""
          for c in "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
                   google-chrome google-chrome-stable chromium chromium-browser; do
            if [ -x "$c" ]; then CHROME=$c; break; fi
            if command -v "$c" >/dev/null 2>&1; then CHROME=$(command -v "$c"); break; fi
          done
          echo "Chrome: $CHROME"
          [ -n "$CHROME" ] || { echo "未找到 Chrome，无法验证"; exit 1; }
          html='data:text/html,<html><body id=x></body><script>document.getElementById("x").textContent=Intl.DateTimeFormat().resolvedOptions().timeZone</script></html>'
          run_tz() {
            TZ="$1" "$CHROME" --headless=new --disable-gpu --no-sandbox \
              --virtual-time-budget=2000 --dump-dom "$html" 2>/dev/null \
              | grep -oE 'Asia/Tokyo|America/New_York|Europe/London|UTC' | head -1
          }
          tokyo=$(run_tz Asia/Tokyo)
          ny=$(run_tz America/New_York)
          echo "TZ=Asia/Tokyo → ${tokyo:-<空>}    TZ=America/New_York → ${ny:-<空>}"
          if [ "$tokyo" = "Asia/Tokyo" ] && [ "$ny" = "America/New_York" ]; then
            echo "✅ PASS：$(uname) 上真 Chrome 遵从 TZ —— browse-vpn.sh 的时区机制成立"
          else
            echo "❌ FAIL：Chrome 未按 TZ 报告时区"; exit 1
          fi

      - name: WebRTC 检测页冒烟（真 Chrome 跑完检测逻辑）
        shell: bash
        run: |
          set -e
          CHROME=""
          for c in "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
                   google-chrome google-chrome-stable chromium chromium-browser; do
            if [ -x "$c" ]; then CHROME=$c; break; fi
            if command -v "$c" >/dev/null 2>&1; then CHROME=$(command -v "$c"); break; fi
          done
          [ -n "$CHROME" ] || { echo "no chrome"; exit 1; }
          # 无头下 STUN 的真实 UDP 往返无法被 --dump-dom 等待到，故只冒烟：
          # 断言检测逻辑跑到"终态判定"（非 PENDING / 非 UNSUPPORTED / 无 JS 报错），
          # 证明 RTCPeerConnection 构造、候选解析、判定渲染在真机上均正常。
          # 硬超时兜底：部分 runner 封了 STUN/出网会让无头 Chrome 卡住，25s 后强杀，
          # 拿不到终态则记为环境限制跳过（不挂起、不误判失败）。
          "$CHROME" --headless=new --disable-gpu --no-sandbox --virtual-time-budget=8000 \
                --user-data-dir=/tmp/rtcsmoke --dump-dom "file://$PWD/webrtc-leak-test.html" \
                >/tmp/rtc.out 2>/dev/null &
          cpid=$!
          ( sleep 25; kill -9 $cpid 2>/dev/null ) &
          kpid=$!
          wait $cpid 2>/dev/null || true
          kill $kpid 2>/dev/null || true
          v=$(grep -oE 'WEBRTC RESULT:[A-Z_]+' /tmp/rtc.out 2>/dev/null | head -1 | sed 's/.*://')
          echo "检测页终态判定: ${v:-<无输出>}"
          case "$v" in
            OK|LEAK|NO_SRFLX|SRFLX_NO_EXITREF)
              echo "✅ PASS：$(uname) 上 WebRTC 检测页跑到终态（判定=$v），逻辑无报错" ;;
            PENDING|UNSUPPORTED)
              echo "❌ FAIL：检测页停在 $v，疑似 JS 报错或 RTCPeerConnection 不可用"
              grep -iE 'result|verdict' /tmp/rtc.out | head; exit 1 ;;
            "")
              echo "⏭ SKIP：无终态输出（该 runner 可能封了 STUN/出网）。真机请用 browse-vpn --webrtc 实测。" ;;
            *)
              echo "❌ FAIL：意外判定 $v"; exit 1 ;;
          esac
